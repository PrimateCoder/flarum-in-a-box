services:
  flarum:
    build:
      context: .
      dockerfile: src/box/Dockerfile
    ports:
      - "8080:80"
    environment:
      # Only FLARUM_FORUM_URL is honored at runtime (set if using a different port).
      # All other config (admin, DB, extensions) is baked in at build time.
      - FLARUM_FORUM_URL=http://localhost:8080
    restart: unless-stopped
