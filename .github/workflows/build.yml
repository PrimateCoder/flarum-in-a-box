name: Build and Push Docker Image

on:
  # Build only on tag push (releases) and manual dispatch.
  # Day-to-day commits to main don't trigger builds — tag a release to publish.
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE_NAME: pianotell/flarum-in-a-box

# Cancel in-flight builds for the same ref (e.g. when a tag is force-pushed).
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build each architecture in parallel on a native runner of that architecture.
  # No QEMU emulation = setup.sh (MariaDB + ~80 extensions + seeding) finishes
  # in ~1 min instead of ~15 min on each side.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    outputs:
      digest-amd64: ${{ steps.export.outputs.digest-amd64 }}
      digest-arch: ${{ steps.export.outputs.digest-arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/box/Dockerfile
          platforms: ${{ matrix.platform }}
          # Push only the digest — the manifest job below stitches the
          # per-arch digests into a multi-arch tag.
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Export digest
        id: export
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-arch digests into the user-facing multi-arch tags
  # (latest, v0.2.10, 0.2, etc.). This job is cheap — it just talks to
  # the registry; no rebuild.
  manifest:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download all digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # On tag push: 0.2.1, 0.2, latest, sha-xxx
          # On manual dispatch (from main): latest, sha-xxx
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.ref == 'refs/heads/main' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<<"$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
